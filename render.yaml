services:
  - type: web
    name: arfurniture-api
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
